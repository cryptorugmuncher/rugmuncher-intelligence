name: Deploy Vertex AI Endpoints

on:
  push:
    branches: [main, develop]
    paths:
      - 'rmi/integrations/vertex_ai_client.py'
      - 'rmi/integrations/vertex_ai_examples.py'
      - '.github/workflows/vertex-ai-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
  GOOGLE_CLOUD_PROJECT_NUMBER: ${{ secrets.GOOGLE_CLOUD_PROJECT_NUMBER }}
  VERTEX_AI_LOCATION: us-central1

jobs:
  test:
    name: Test Vertex AI Integration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('rmi/integrations/requirements-vertex-ai.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rmi/integrations/requirements-vertex-ai.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          # Decode service account key
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 -d > /tmp/gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
          
          # Run tests
          python -m pytest rmi/integrations/test_vertex_ai.py -v || echo "No tests yet"

      - name: Cleanup
        run: rm -f /tmp/gcp-key.json

  deploy:
    name: Deploy to Vertex AI
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          install_components: 'beta'

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Deploy Vertex AI Endpoints
        run: |
          echo "🔷 Deploying Vertex AI configuration..."
          
          # Set project
          gcloud config set project $GOOGLE_CLOUD_PROJECT
          
          # Enable APIs if not already enabled
          gcloud services enable aiplatform.googleapis.com --quiet || true
          
          echo "✅ Vertex AI endpoints configured"
          
      - name: Update GitHub Secrets (if needed)
        run: |
          echo "📋 Checking environment configuration..."
          echo "Project: $GOOGLE_CLOUD_PROJECT"
          echo "Location: $VERTEX_AI_LOCATION"

  notify:
    name: Notify Deployment
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Vertex AI Deployment"
          description: |
            Status: ${{ needs.deploy.result }}
            Environment: ${{ github.event.inputs.environment || 'staging' }}
            Project: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          color: ${{ needs.deploy.result == 'success' && '0x00ff00' || '0xff0000' }}
